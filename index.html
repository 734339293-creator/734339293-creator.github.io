// 初始化地图
const map = L.map('map').setView([39.9042, 116.4074], 12);

// 高德底图
L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}&ak=E4805d16520de693a3fe707cdc962045', {
    subdomains: '1234', maxZoom: 18
}).addTo(map);

// 红色避难场所图标
const redIcon = L.divIcon({
    html: '<div style="background:#d32f2f;width:12px;height:12px;border-radius:50%;border:2px solid #fff;"></div>',
    iconSize: [16, 16], popupAnchor: [0, -8]
});

// 渲染所有避难场所 + APP导航
shelters.forEach(item => {
    const marker = L.marker([item.lat, item.lng], { icon: redIcon }).addTo(map);
    const appNavUrl = `baidumap://map/direction?destination=latlng:${item.lat},${item.lng}|name:${encodeURIComponent(item.name)}&mode=driving&coord_type=gcj02&src=web`;
    const popup = `
    <div class="custom-popup">
        <div class="popup-title">${item.name}</div>
        <div class="popup-info">📍 ${item.district}</div>
        <div class="popup-info">🏞️ ${item.address}</div>
        <div class="popup-info">📏 ${item.area}</div>
        <a class="nav-btn" href="${appNavUrl}" target="_blank">打开百度地图导航</a>
    </div>`;
    marker.bindPopup(popup);
});

// ============== 核心：手机自动定位（打开就显示你的位置） ==============
map.locate({
    setView: true,        // 自动把地图中心移到你的位置
    maxZoom: 16,          // 定位后放大级别
    watch: false,
    enableHighAccuracy: true // 高精度定位
});

// 显示蓝色定位图标
map.on('locationfound', function(e) {
    L.circleMarker(e.latlng, {
        radius: 8,
        fillColor: '#2196F3',
        color: '#fff',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.8
    }).addTo(map).bindPopup("你的位置").openPopup();
});
